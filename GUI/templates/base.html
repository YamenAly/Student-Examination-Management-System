<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ExamHub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-dot"></span>ExamHub
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Portal</a>
      <a href="/admin" class="nav-link {% if request.endpoint == 'admin' %}active{% endif %}">Admin</a>
      <a href="/reports" class="nav-link {% if request.endpoint == 'reports' %}active{% endif %}">Reports</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
